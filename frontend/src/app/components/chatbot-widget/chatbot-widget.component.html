<!-- Floating Button -->
    <div class="fixed bottom-6 right-6 z-50">
      <button
        (click)="toggleChat()"
        [class]="buttonClasses"
        [@buttonScale]="buttonState"
        (mouseenter)="buttonState = 'hover'"
        (mouseleave)="buttonState = 'normal'"
        [attr.aria-label]="isOpen ? 'Close chat' : 'Open chat'"
      >
        <!-- Close Icon -->
        <svg *ngIf="isOpen" class="w-6 h-6 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        <!-- Message Circle Icon -->
        <svg *ngIf="!isOpen" class="w-6 h-6 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
      </button>
    </div>

    <!-- Chat Window -->
    <div
      [@slideInOut]="isOpen ? 'in' : 'out'"
      class="fixed bottom-24 right-6 w-80 sm:w-96 h-96 bg-white rounded-2xl shadow-2xl z-40 border border-gray-200"
      [class.pointer-events-none]="!isOpen"
    >
      <!-- Header -->
      <div class="flex items-center justify-between p-4 border-b border-gray-200 bg-blue-600 text-white rounded-t-2xl">
        <div class="flex items-center space-x-3">
          <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center">

          <div>
            <h3 class="font-semibold text-sm">Support Assistant</h3>
            <p class="text-xs text-blue-100">Online now</p>
          </div>
        </div>
        <button
          (click)="closeChat()"
          class="p-1 hover:bg-blue-500 rounded-full transition-colors duration-200"
          aria-label="Close chat"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>

      </div>

              <p class="leading-relaxed">{{ message.text }}</p>
              <!-- User Icon -->
              <svg *ngIf="message.sender === 'user'" class="w-4 h-4 text-blue-200 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- Typing Indicator -->
        <div *ngIf="isTyping" class="flex justify-start">
          <div class="bg-gray-100 text-gray-800 px-4 py-2 rounded-2xl rounded-bl-md text-sm">
            <div class="flex items-center space-x-2">
              <svg class="w-4 h-4 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
              </svg>
              <div class="flex space-x-1">
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="p-4 border-t border-gray-200 bg-gray-50 rounded-b-2xl">
        <div class="flex items-center space-x-2">
          <input
            #messageInput
            type="text"
            [(ngModel)]="inputValue"
            (keydown.enter)="sendMessage()"
            placeholder="Type your message..."
            class="flex-1 px-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
            [disabled]="isTyping"
          />
          <button
            (click)="sendMessage()"
            [disabled]="!inputValue.trim() || isTyping"
            class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-200"
            aria-label="Send message"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Backdrop -->
    <div 
      *ngIf="isOpen"
      class="fixed inset-0 bg-black bg-opacity-20 z-30 sm:hidden" 
      (click)="closeChat()">
    </div>
